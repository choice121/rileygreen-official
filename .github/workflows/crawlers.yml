name: 🎸 Riley Green — Content Crawlers

on:
  # Single schedule every 2 hours — all crawlers are idempotent upserts,
  # so running them frequently is safe and keeps content fresh.
  schedule:
    - cron: "0 */2 * * *"

  # Manual trigger with per-crawler selection
  workflow_dispatch:
    inputs:
      crawler:
        description: "Which crawler(s) to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - albums
          - tour
          - news
          - merch
          - videos
          - gallery

# Each crawler gets its own concurrency group so they run in parallel
# and don't cancel each other.

jobs:
  # ── Albums & Tracks (Deezer — no API key needed) ──────────────────────────
  albums:
    name: 🎵 Albums & Tracks
    runs-on: ubuntu-latest
    concurrency:
      group: crawler-albums
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'albums')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run albums crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
        run: python run_all.py --crawler albums

  # ── Tour Dates (Bandsintown — no API key needed) ───────────────────────────
  tour:
    name: 🎟️ Tour Dates
    runs-on: ubuntu-latest
    concurrency:
      group: crawler-tour
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'tour')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run tour crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler tour

  # ── News (crawl4ai — no API key needed) ───────────────────────────────────
  news:
    name: 📰 News
    runs-on: ubuntu-latest
    concurrency:
      group: crawler-news
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'news')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Install Playwright browsers
        working-directory: crawlers
        run: |
          python -m playwright install chromium --with-deps || \
          (sleep 30 && python -m playwright install chromium --with-deps)
      - name: Run news crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler news

  # ── Merch (crawl4ai — no API key needed) ──────────────────────────────────
  merch:
