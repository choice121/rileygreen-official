name: 🎸 Morgan Wallen — Content Crawlers

on:
  # ── Automatic schedules ────────────────────────────────────────────────────
  schedule:
    - cron: "0 */2 * * *"    # news: every 2 hours
    - cron: "0 */6 * * *"    # tour: every 6 hours
    - cron: "0 8 * * *"      # videos + merch + gallery: daily 8 AM UTC
    - cron: "0 9 * * 1"      # albums: weekly Monday 9 AM UTC

  # ── Manual trigger ─────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      crawler:
        description: "Which crawler(s) to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - albums
          - tour
          - news
          - merch
          - videos
          - gallery

concurrency:
  group: crawlers-${{ github.ref }}
  cancel-in-progress: true

# ── Shared install step (composite would be cleaner but this is simpler) ──────
# Each job installs deps independently on fresh Ubuntu runners.

jobs:
  # ── Albums & Tracks (Deezer — no extra API key needed) ────────────────────
  albums:
    name: 🎵 Albums & Tracks
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'albums')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run albums crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler albums

  # ── Tour Dates (Bandsintown — no API key needed) ───────────────────────────
  tour:
    name: 🎟️ Tour Dates
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'tour')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tour crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler tour

  # ── News (crawl4ai — no API key needed) ───────────────────────────────────
  news:
    name: 📰 News
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'news')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      - name: Run news crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler news

  # ── Merch (crawl4ai — no API key needed) ──────────────────────────────────
  merch:
    name: 🛍️ Merch
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'merch')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      - name: Run merch crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
        run: python run_all.py --crawler merch

  # ── Videos (YouTube RSS + crawl4ai — no API key needed) ───────────────────
  videos:
    name: 🎬 Videos
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'videos')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      - name: Run videos crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler videos

  # ── Gallery (YouTube thumbnails + ImageKit — no API key needed) ─────────────
  gallery:
    name: 🖼️ Gallery
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'gallery')) ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      - name: Run gallery crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
        run: python run_all.py --crawler gallery
